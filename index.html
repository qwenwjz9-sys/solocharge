<script>
"use strict";
const S={battery:72,initBattery:70,highToday:72,lowToday:55,records:[],customEvents:[],selectedEvent:null,selectedAdjust:0,sheetTab:'d',trendPeriod:'today',lowBatteryAlert:true,weeklyReportOn:true,resetTime:0,alertedToday:false,lastResetDate:null,nextCustId:1};
const PRESET={d:[{emoji:'🎉',name:'社交聚会',value:-20},{emoji:'🎯',name:'正式面试',value:-30},{emoji:'💼',name:'工作会议',value:-15},{emoji:'📞',name:'电话沟通',value:-10},{emoji:'😶',name:'陌生人交流',value:-15},{emoji:'🔊',name:'嘈杂环境',value:-10}],c:[{emoji:'🧘',name:'独处发呆',value:25},{emoji:'🌿',name:'去公园散步',value:20},{emoji:'📖',name:'看书',value:15},{emoji:'🎵',name:'听音乐',value:10},{emoji:'☕',name:'喝咖啡/茶',value:10},{emoji:'😴',name:'睡觉/小憩',value:30}]};
const I={p:'🎉',b:'🎯',c:'💼',ph:'📞',ch:'😶',no:'🔊',me:'🧘',l:'🌿',bk:'📖',m:'🎵',co:'☕',sl:'😴',pl:'📌',lg:'⚡'};
function gI(n){const m={'社交聚会':I.p,'正式面试':I.b,'工作会议':I.c,'电话沟通':I.ph,'陌生人交流':I.ch,'嘈杂环境':I.no,'独处发呆':I.me,'去公园散步':I.l,'看书':I.bk,'听音乐':I.m,'喝咖啡/茶':I.co,'睡觉/小憩':I.sl};return m[n]||I.pl}
const $=id=>document.getElementById(id);
const LS_KEY='solocharge_data';
function save(){try{const d={records:S.records.filter(r=>{const dd=new Date(r.time);const t=new Date;return dd.getDate()===t.getDate()&&dd.getMonth()===t.getMonth()&&dd.getFullYear()===t.getFullYear()}),customEvents:S.customEvents,initBattery:S.initBattery,battery:S.battery,highToday:S.highToday,lowToday:S.lowToday,lowBatteryAlert:S.lowBatteryAlert,weeklyReportOn:S.weeklyReportOn,resetTime:S.resetTime,alertedToday:S.alertedToday,lastResetDate:S.lastResetDate,nextCustId:S.nextCustId};localStorage.setItem(LS_KEY,JSON.stringify(d))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(!d)return;S.initBattery=d.initBattery??70;S.battery=d.battery??S.initBattery;S.highToday=d.highToday??S.battery;S.lowToday=d.lowToday??S.battery;S.lowBatteryAlert=d.lowBatteryAlert!==false;S.weeklyReportOn=d.weeklyReportOn!==false;S.resetTime=d.resetTime??0;S.alertedToday=!!d.alertedToday;S.lastResetDate=d.lastResetDate??null;S.nextCustId=d.nextCustId??1;if(d.customEvents)S.customEvents=d.customEvents.map(e=>({...e}));if(d.records){S.records=d.records.map(r=>({...r,time:new Date(r.time)}))}}catch(e){}}
function checkReset(){const now=new Date;const today=now.getDate()+'-'+now.getMonth()+'-'+now.getFullYear();if(S.lastResetDate!==today){const targetH=S.resetTime===0?0:6;const resetH=now.getHours();if(resetH>=targetH){S.battery=S.initBattery;S.highToday=S.initBattery;S.lowToday=S.initBattery;S.alertedToday=false;S.lastResetDate=today;save()}}}
function getEvents(ty){const p=PRESET[ty]||[];const c=S.customEvents.filter(e=>e.type===ty);return[...c,...p]}
function getTodayRecords(){return S.records.filter(r=>{const d=new Date(r.time);const t=new Date;return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()})}
function getWeekRecords(){const now=new Date;const ms=[];for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);ms.push(d)}return ms.map(day=>{const end=new Date(day);end.setHours(23,59,59,999);const start=new Date(day);start.setHours(0,0,0,0);const r=S.records.filter(rec=>{const t=new Date(rec.time);return t>=start&&t<=end});return{date:day,records:r,count:r.length,avg:r.length?Math.round(r.reduce((s,rec)=>s+rec.value,0)/r.length):0,battery:0}})}
function uB(v,a){const c=Math.max(0,Math.min(100,v));const o=S.battery;S.battery=c;const cur=parseInt($('bN').textContent);if(a&&cur!==c){const d=600,s=performance.now();function fn(t){const p=Math.min((t-s)/d,1),e=1-Math.pow(1-p,3);$('bN').textContent=Math.round(cur+(c-cur)*e);if(p<1)requestAnimationFrame(fn)}requestAnimationFrame(fn)}else $('bN').textContent=c;const bf=document.querySelectorAll('.bf');const bw=c/100*77;bf.forEach(el=>{el.setAttribute('width',Math.max(0,bw))});const fc=c<=30?'var(--ds)':c<=60?'var(--ac)':'var(--cs)';bf.forEach(el=>{el.style.fill=fc});if(c>o){try{const cg=document.getElementById('bChargeGlow');if(cg){cg.style.opacity='.3';cg.style.transition='opacity .6s ease-out';setTimeout(()=>{cg.style.opacity='0'},600)}}catch(e){}}$('bC').style.background=c<=30?'linear-gradient(135deg,#1A0D0D 0%,#0D0F14 60%,#140D12 100%)':c<=60?'linear-gradient(135deg,#1A1508 0%,#0D0F14 60%,#141218 100%)':'linear-gradient(135deg,#0D1A18 0%,#0D0F14 60%,#121420 100%)';$('bG').style.background=(c<=30?'rgba(200,126,126,':c<=60?'rgba(200,184,130,':'rgba(126,200,164,')+'0.12)';$('bN').style.color=c<=30?'var(--ds)':c<=60?'var(--ac)':'var(--cs)';try{$('bSw').style.filter='drop-shadow(0 4px 16px '+(c<=30?'rgba(200,126,126,0.25)':c<=60?'rgba(200,184,130,0.25)':'rgba(126,200,164,0.25)')+')'}catch(e){};$('bC').classList.toggle('bp',c<=30&&c>0);if(c>S.highToday){S.highToday=c;$('hT').textContent=c}if(c<S.lowToday||S.lowToday===null){S.lowToday=c;$('lT').textContent=c}save()}
function rRL(){const r=getTodayRecords();$('rc').textContent=r.length+' 条';$('rL').innerHTML='';if(r.length===0){$('rL').innerHTML='<div class="es" id="eS"><div class="q">"安静是另一种力量。"</div><div>今天还没有记录</div></div>';return}const display=r.length>20?r.slice(r.length-20):[...r];display.reverse();display.forEach((rec,i)=>{const realIdx=S.records.indexOf(rec);const isC=rec.value>0;const d=document.createElement('div');d.className='rli';d.innerHTML='<div class="ri '+(isC?'c':'d')+'"></div><div class="ri2"><div class="rn">'+gI(rec.name)+'</div><div class="rm">'+new Date(rec.time).getHours().toString().padStart(2,'0')+':'+new Date(rec.time).getMinutes().toString().padStart(2,'0')+'</div></div><div class="rv '+(isC?'c':'d')+'">'+(rec.value>0?'+':'')+rec.value+'</div><button class="del-btn" data-idx="'+realIdx+'">删除</button>';d.addEventListener('click',function(e){if(e.target.closest('.del-btn'))return;this.classList.toggle('show-del')});const db=d.querySelector('.del-btn');db.addEventListener('click',function(e){e.stopPropagation();const idx=parseInt(this.dataset.idx);const rec2=S.records[idx];S.records.splice(idx,1);uB(S.battery-rec2.value);rRL();updateTrends();showToast('已删除「'+rec2.name+'」','撤销',()=>{S.records.splice(idx,0,rec2);uB(S.battery+rec2.value);rRL();updateTrends();showToast('已恢复「'+rec2.name+'」')})});$('rL').appendChild(d)});if(r.length>20){const m=document.createElement('div');m.style.cssText='text-align:center;padding:12px;color:var(--tt);font-size:12px';m.textContent='还有 '+(r.length-20)+' 条较早记录';$('rL').appendChild(m)}}
let tt=null;function showToast(t,act,cb){clearTimeout(tt);const to=$('tO');to.innerHTML=t+(act?'<span class="u" id="tU">'+act+'</span>':'');to.classList.add('v');if(act&&cb){const u=document.getElementById('tU');if(u)u.addEventListener('click',function(e){e.stopPropagation();cb();to.classList.remove('v');clearTimeout(tt)})}tt=setTimeout(()=>to.classList.remove('v'),5000)}
function oS(){$('sO').classList.add('o');$('bSh').classList.add('o');rE()}
function cS(){$('sO').classList.remove('o');$('bSh').classList.remove('o');S.selectedEvent=null;S.selectedAdjust=0;$('cF').disabled=true}
function rE(){$('eG').innerHTML='';const ty=S.sheetTab==='d'?'d':'c';const list=getEvents(ty);list.forEach((evt,i)=>{const isC=evt.value>0;const card=document.createElement('div');card.className='ec';card.classList.add(isC?'cc':'dc');card.dataset.eidx=i;card.innerHTML='<div class="n2"></div>'+(evt.isCustom?'<div class="cust-label">自定义</div>':'')+'<div class="ee">'+gI(evt.name)+'</div><div class="en">'+evt.name+'</div><div class="ev '+(isC?'c':'d')+'">'+(evt.value>0?'+':'')+evt.value+'</div><div class="eab"><button class="adbtn" data-adj="-5">−5</button><span class="adj" data-base="'+evt.value+'">'+(evt.value>0?'+':'')+evt.value+'</span><button class="adbtn" data-adj="+5">+5</button></div>';if(evt.isCustom){const ed=document.createElement('div');ed.className='cust-edit';ed.innerHTML='<button data-act="edit" title="编辑">✎</button><button data-act="del" title="删除">✕</button>';card.appendChild(ed);ed.querySelector('[data-act="edit"]').addEventListener('click',e=>{e.stopPropagation();openCustModal(evt)});ed.querySelector('[data-act="del"]').addEventListener('click',e=>{e.stopPropagation();const idx=S.customEvents.indexOf(evt);if(idx>=0){S.customEvents.splice(idx,1);save();rE()}})}card.addEventListener('click',function(e){if(e.target.closest('.adbtn')||e.target.closest('.cust-edit'))return;$('eG').querySelectorAll('.ec').forEach(c=>c.classList.remove('s'));this.classList.add('s');const allEvts=getEvents(ty);S.selectedEvent=allEvts[parseInt(this.dataset.eidx)];S.selectedAdjust=0;$('cF').disabled=false;this.querySelector('.adj').textContent=(S.selectedEvent.value>0?'+':'')+S.selectedEvent.value});$('eG').appendChild(card)});const addCard=document.createElement('div');addCard.className='ec';addCard.style.cssText='justify-content:center;align-items:center;min-height:68px;border-style:dashed;cursor:pointer';addCard.innerHTML='<div style="font-size:24px;opacity:.6;margin-bottom:4px">+</div><div style="font-size:12px;color:var(--tt)">添加自定义</div>';addCard.addEventListener('click',e=>{e.stopPropagation();openCustModal()});$('eG').appendChild(addCard);$('eG').querySelectorAll('.adbtn').forEach(btn=>{btn.addEventListener('click',function(e){e.stopPropagation();const card=this.closest('.ec');const adjSpan=card.querySelector('.adj');const base=parseInt(adjSpan.dataset.base);const delta=parseInt(this.dataset.adj);const ev=getEvents(S.sheetTab==='d'?'d':'c')[parseInt(card.dataset.eidx)];const na=Math.max(-20,Math.min(20,(S.selectedEvent===ev?S.selectedAdjust:0)+delta));S.selectedAdjust=na;S.selectedEvent=ev;adjSpan.textContent=(base+na>0?'+':'')+(base+na);$('cF').disabled=false})})}
function cR(){if(!S.selectedEvent)return;const fv=S.selectedEvent.value+S.selectedAdjust;const c=Math.max(0,Math.min(100,S.battery+fv));const _e=S.selectedEvent;S.records.push({name:_e.name,value:fv,time:new Date()});save();rRL();uB(c);cS();updateTrends();showToast('已记录 '+(fv>0?'+':'')+fv);if(c<=30&&S.lowBatteryAlert&&!S.alertedToday){S.alertedToday=true;save();setTimeout(()=>showToast(['电量有点低了，要不要给自己安排点独处时间？','今天消耗不少，找个安静的地方待一会儿吧。','电量预警，记得给自己充充电。'][Math.floor(Math.random()*3)]),2500)}}
let cmEvt=null;function openCustModal(evt){cmEvt=evt||null;const mo=$('mO');$('mT').textContent=evt?'编辑自定义事件':'添加自定义事件';$('mN').value=evt?evt.name:'';$('mV').textContent=evt?Math.abs(evt.value):20;const d=document.querySelector('[data-mt="d"]');const c=document.querySelector('[data-mt="c"]');if(evt){if(evt.value<0){d.classList.add('a');c.classList.remove('a')}else{c.classList.add('a');d.classList.remove('a')}}else{d.classList.add('a');c.classList.remove('a')}mo.classList.add('o')}
function closeCustModal(){cmEvt=null;$('mO').classList.remove('o')}
function confirmCustModal(){const name=$('mN').value.trim();if(!name||name.length>10){showToast('名称不能为空且不超过 10 字');return}if(S.customEvents.length>=10&&!cmEvt){showToast('最多支持 10 个自定义事件');return}const isDrain=document.querySelector('[data-mt="d"].a')!==null;const displayVal=parseInt($('mV').textContent)||20;const value=isDrain?-displayVal:displayVal;const existingName=S.customEvents.find(e=>e.name===name&&e!==cmEvt);if(existingName&&!cmEvt){showToast('已存在同名事件');return}if(cmEvt){cmEvt.name=name;cmEvt.value=value;cmEvt.type=isDrain?'d':'c'}else{S.customEvents.push({name,value,type:isDrain?'d':'c',isCustom:true,id:S.nextCustId++})}save();closeCustModal();rE()}
function sT(t){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('a'));document.querySelectorAll('.ti').forEach(x=>x.classList.remove('a'));const map={h:'pH',t:'pT',s:'pS'};$(map[t]).classList.add('a');document.querySelector('.ti[data-t="'+t+'"]').classList.add('a')}
function updateTrends(){renderChart(S.trendPeriod);renderReport()}
function renderChart(p){const svg=$('cSvg');svg.innerHTML='<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8B882" stop-opacity=".3"/><stop offset="100%" stop-color="#C8B882" stop-opacity="0"/></linearGradient></defs>';const W=320,H=180,pt=10,pl=30,cw=260,ch=145,tt=$('cTT');for(let i=0;i<=4;i++){const y=pt+ch*i/4;const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',pl);l.setAttribute('x2',W-10);l.setAttribute('y1',y);l.setAttribute('y2',y);l.classList.add('cgl');svg.appendChild(l);const lb=document.createElementNS('http://www.w3.org/2000/svg','text');lb.setAttribute('x',pl-4);lb.setAttribute('y',y+3);lb.classList.add('clb');lb.textContent=100-i*25;svg.appendChild(lb)}
if(p==='today'){const pts=[],hours=['8a','10a','12p','2p','4p','6p','8p'];const todayR=getTodayRecords();const vals=[];for(let i=0;i<hours.length;i++){const h=8+i*2;const filterR=todayR.filter(r=>{const t=new Date(r.time);let hour=t.getHours();if(hour===h||(i===0&&hour<10)||(i===hours.length-1&&hour>=18))return true;return i>0&&hour>=(8+(i-1)*2)&&hour<(8+i*2)});const totalDelta=filterR.reduce((s,r)=>s+r.value,0);vals.push(Math.max(0,Math.min(100,S.battery-totalDelta)))}pts.push({x:pl,y:pt+ch*(1-vals[0]/100)});vals.forEach((v,i)=>{pts.push({x:pl+cw*i/(vals.length-1),y:pt+ch*(1-v/100)})});pts.push({x:pl+cw,y:pt+ch*(1-vals[vals.length-1]/100)});let ad='M '+pts[0].x+' '+(pt+ch)+' L';pts.forEach(p=>{ad+=' '+p.x+' '+p.y});ad+=' L '+pts[pts.length-1].x+' '+(pt+ch)+' Z';const a=document.createElementNS('http://www.w3.org/2000/svg','path');a.setAttribute('d',ad);a.classList.add('caf');svg.appendChild(a);let ld='M '+pts[0].x+' '+pts[0].y;for(let i=1;i<pts.length;i++)ld+=' L '+pts[i].x+' '+pts[i].y;const l=document.createElementNS('http://www.w3.org/2000/svg','path');l.setAttribute('d',ld);l.classList.add('cl');svg.appendChild(l);pts.forEach((p,i)=>{if(i===0||i===pts.length-1)return;const dt=document.createElementNS('http://www.w3.org/2000/svg','circle');dt.setAttribute('cx',p.x);dt.setAttribute('cy',p.y);dt.classList.add('cd');dt.setAttribute('r','3.5');const h=hours[i-1];const v=vals[i-1];const hourR=todayR.filter(r=>{const t=new Date(r.time);const rh=t.getHours();return rh>=8+(i-2)*2&&rh<8+(i-1)*2});dt.addEventListener('click',()=>{if(hourR.length===0){tt.innerHTML='<span style="color:var(--ts)">'+h+': 无记录</span>';tt.classList.add('v');setTimeout(()=>tt.classList.remove('v'),2000);return}tt.innerHTML=hourR.map(r=>'<span style="color:'+(r.value>0?'var(--cs)':'var(--ds)')+'">'+(r.value>0?'+':'')+r.value+'</span> '+r.name).join('<br>');tt.style.left=p.x-60+'px';tt.style.top=(p.y-50)+'px';tt.classList.add('v');setTimeout(()=>tt.classList.remove('v'),2500)});svg.appendChild(dt)});hours.forEach((h,i)=>{const lb=document.createElementNS('http://www.w3.org/2000/svg','text');lb.setAttribute('x',pl+cw*i/(hours.length-1));lb.setAttribute('y',pt+ch+14);lb.classList.add('clb');lb.textContent=h;svg.appendChild(lb)})}else if(p==='week'){const data=getWeekRecords();const bw=cw/data.length*0.6,gap=cw/data.length;data.forEach((d,i)=>{const x=pl+gap*i+gap/2-bw/2;const batteryAtDay=S.battery;const bh=ch*Math.abs(d.avg)/100||0;const y=pt+ch-bh;const bar=document.createElementNS('http://www.w3.org/2000/svg','rect');bar.setAttribute('x',x);bar.setAttribute('y',pt+ch);bar.setAttribute('width',bw);bar.setAttribute('height','0');bar.classList.add('cb2');svg.appendChild(bar);setTimeout(()=>{bar.setAttribute('y',y);bar.setAttribute('height',bh)},i*80);bar.addEventListener('click',()=>{const dayR=d.records;if(dayR.length===0){tt.innerHTML='<span style="color:var(--ts)">'+d.date.getDate()+'日: 暂无记录</span>';tt.classList.add('v');setTimeout(()=>tt.classList.remove('v'),2000);return}tt.innerHTML=dayR.map(r=>'<span style="color:'+(r.value>0?'var(--cs)':'var(--ds)')+'">'+(r.value>0?'+':'')+r.value+'</span> '+r.name).join('<br>');tt.style.left=Math.min(x,250)+'px';tt.style.top='60px';tt.classList.add('v');setTimeout(()=>tt.classList.remove('v'),2500)});const lb=document.createElementNS('http://www.w3.org/2000/svg','text');lb.setAttribute('x',pl+gap*i+gap/2);lb.setAttribute('y',pt+ch+14);lb.classList.add('clb');const dayStr=d.date.getDate()+'/'+(d.date.getMonth()+1);lb.textContent=dayStr;svg.appendChild(lb)})}}

function renderReport(){const now=new Date;const weekR=[];for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);weekR.push(d)}const allWeekRecs=weekR.flatMap(day=>{const end=new Date(day);end.setHours(23,59,59,999);const start=new Date(day);start.setHours(0,0,0,0);return S.records.filter(r=>{const t=new Date(r.time);return t>=start&&t<=end})});if(allWeekRecs.length===0){$('aB').textContent='—';$('rC').textContent='—';$('wD').textContent='—';$('wC').textContent='—';$('wS').textContent='暂无本周数据';return}$('rC').textContent=allWeekRecs.length+' 次';const drainEvts=allWeekRecs.filter(r=>r.value<0);const chargeEvts=allWeekRecs.filter(r=>r.value>0);const drainMap={};drainEvts.forEach(r=>{drainMap[r.name]=(drainMap[r.name]||0)+r.value});const topDrain=Object.entries(drainMap).sort((a,b)=>a[1]-b[1])[0];const chargeMap={};chargeEvts.forEach(r=>{chargeMap[r.name]=(chargeMap[r.name]||0)+r.value});const topCharge=Object.entries(chargeMap).sort((a,b)=>b[1]-a[1])[0];$('wD').textContent=topDrain?topDrain[0]:'—';$('wC').textContent=topCharge?topCharge[0]:'—';const totalDelta=allWeekRecs.reduce((s,r)=>s+r.value,0);const startBattery=S.battery-totalDelta;const avgB=Math.round((startBattery+S.battery)/2);$('aB').textContent=avgB+'%';const weekCompare=avgB>=50?'比上周高了':'比上周低了';$('wS').textContent='上周你共记录了 '+allWeekRecs.length+' 次。最耗电的是「'+(topDrain?topDrain[0]:'无')+'」，最充电的是「'+(topCharge?topCharge[0]:'无')+'」。平均电量 '+avgB+'%，'+weekCompare+' 一些。'}
function exportCSV(){const header='时间,事件名称,数值变化,类型\n';const rows=S.records.map(r=>{const d=new Date(r.time);const timeStr=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');const val=r.value>0?'+'+r.value:String(r.value);const type=r.value>0?'充电':'耗电';return timeStr+','+r.name+','+val+','+type}).join('\n');const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SoloCharge_数据导出_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);showToast('数据已导出为 CSV')}
function init(){load();checkReset();const now=new Date;.textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');setInterval(()=>{const n=new Date;checkReset()},60000);uB(S.battery,false);rRL();renderChart('today');renderReport();$('iV').textContent=S.initBattery;$('rV').textContent=S.resetTime===0?'00:00':'06:00';if(!S.lowBatteryAlert)$('lTg').classList.remove('o');if(!S.weeklyReportOn)$('wTg').classList.remove('o');
document.querySelectorAll('.ti').forEach(item=>{item.addEventListener('click',()=>sT(item.dataset.t))});$('fB').addEventListener('click',oS);$('sO').addEventListener('click',cS);$('sX').addEventListener('click',cS);
document.querySelectorAll('.shtb-b').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.shtb-b').forEach(t=>t.classList.remove('a'));tab.classList.add('a');S.sheetTab=tab.dataset.ty;S.selectedEvent=null;S.selectedAdjust=0;$('cF').disabled=true;rE()})});$('cF').addEventListener('click',cR);
document.querySelectorAll('.ttab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('a'));tab.classList.add('a');S.trendPeriod=tab.dataset.p;renderChart(S.trendPeriod)})});
$('iD').addEventListener('click',()=>{S.initBattery=Math.max(50,S.initBattery-5);$('iV').textContent=S.initBattery;S.battery=S.initBattery;uB(S.initBattery);save()});$('iI').addEventListener('click',()=>{S.initBattery=Math.min(90,S.initBattery+5);$('iV').textContent=S.initBattery;save()});
$('lTg').addEventListener('click',()=>{S.lowBatteryAlert=!S.lowBatteryAlert;$('lTg').classList.toggle('o');save()});$('wTg').addEventListener('click',()=>{S.weeklyReportOn=!S.weeklyReportOn;$('wTg').classList.toggle('o');save()});
$('rD').addEventListener('click',()=>{S.resetTime=S.resetTime===0?6:0;const h=S.resetTime===0?'00:00':'06:00';$('rV').textContent=h;save()});$('rI').addEventListener('click',()=>{S.resetTime=S.resetTime===0?6:0;const h=S.resetTime===0?'00:00':'06:00';$('rV').textContent=h;save()});
$('eBtn').addEventListener('click',exportCSV);$('cBtn').addEventListener('click',()=>{if(confirm('确定清除所有数据？此操作不可恢复。')){S.records=[];S.battery=S.initBattery;S.highToday=S.initBattery;S.lowToday=S.initBattery;S.alertedToday=false;save();uB(S.initBattery);rRL();updateTrends();showToast('所有数据已清除')}});
document.querySelectorAll('.mtab-b').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('.mtab-b').forEach(x=>x.classList.remove('a'));this.classList.add('a')})});
$('mVd').addEventListener('click',()=>{let v=parseInt($('mV').textContent)||20;v=Math.max(5,v-5);$('mV').textContent=v});$('mVi').addEventListener('click',()=>{let v=parseInt($('mV').textContent)||20;v=Math.min(50,v+5);$('mV').textContent=v});
$('mC').addEventListener('click',closeCustModal);$('mO').addEventListener('click',function(e){if(e.target===this)closeCustModal()});$('mK').addEventListener('click',confirmCustModal);
const d=new Date;if(S.lastResetDate!==d.getDate()+'-'+d.getMonth()+'-'+d.getFullYear()){const targetH=S.resetTime===0?0:6;if(d.getHours()>=targetH){S.battery=S.initBattery;S.highToday=S.initBattery;S.lowToday=S.initBattery;S.alertedToday=false;S.lastResetDate=d.getDate()+'-'+d.getMonth()+'-'+d.getFullYear();uB(S.battery,false);save()}}}
document.addEventListener('DOMContentLoaded',init);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
  });
}
</script></body></html>
