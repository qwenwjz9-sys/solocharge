<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>SoloCharge 二维码</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0D0F14;font-family:system-ui}
.qr-wrap{background:#161820;border-radius:24px;padding:32px;text-align:center}
h2{color:#E8E6E0;font-weight:300;margin:0 0 4px;font-size:22px}
p{color:#9A9890;font-size:13px;margin:0 0 24px}
svg{display:block;margin:0 auto}
.url{color:#5A5855;font-size:11px;margin-top:20px}
</style></head><body>
<div class="qr-wrap">
  <h2>SoloCharge</h2>
  <p>内向者的能量管理工具 · 扫码即用</p>
  <svg id="qr" width="280" height="280" viewBox="0 0 33 33" style="image-rendering:pixelated">
    <rect width="33" height="33" fill="#fff"/>
  </svg>
  <div class="url">https://qwenwjz9-sys.github.io/solocharge/</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById("qr"), {
  text: "https://qwenwjz9-sys.github.io/solocharge/",
  width: 280, height: 280,
  colorDark: "#0D0F14",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body></html>
